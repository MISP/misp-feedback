<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISP Feedback</title>
    <style>
        :root {
            --bg: #f5f7fa;
            --text: #1a1a2e;
            --text-muted: #6b7280;
            --text-faint: #9ca3af;
            --card-bg: #fff;
            --card-border: #e2e8f0;
            --input-bg: #fafbfc;
            --input-border: #d1d5db;
            --input-label: #374151;
            --accent: #4f6ef7;
            --accent-hover: #3b5de7;
            --accent-active: #2f4fd6;
            --accent-glow: rgba(79, 110, 247, 0.1);
            --btn-disabled: #a0aec0;
            --divider: #f3f4f6;
            --badge-hit-bg: #fef3c7;
            --badge-hit-text: #92400e;
            --badge-clean-bg: #d1fae5;
            --badge-clean-text: #065f46;
            --cat-fp-bg: #fee2e2;
            --cat-fp-text: #991b1b;
            --cat-known-bg: #e0e7ff;
            --cat-known-text: #3730a3;
            --error-bg: #fef2f2;
            --error-border: #fecaca;
            --error-text: #991b1b;
            --pill-type-bg: #f0f4ff;
            --pill-type-text: #4338ca;
            --toggle-bg: transparent;
            --toggle-border: #d1d5db;
        }

        [data-theme="dark"] {
            --bg: #111827;
            --text: #e5e7eb;
            --text-muted: #9ca3af;
            --text-faint: #6b7280;
            --card-bg: #1f2937;
            --card-border: #374151;
            --input-bg: #1a2332;
            --input-border: #4b5563;
            --input-label: #d1d5db;
            --accent: #6d8afb;
            --accent-hover: #5a78f0;
            --accent-active: #4f6ef7;
            --accent-glow: rgba(109, 138, 251, 0.15);
            --btn-disabled: #4b5563;
            --divider: #374151;
            --badge-hit-bg: #78350f;
            --badge-hit-text: #fef3c7;
            --badge-clean-bg: #064e3b;
            --badge-clean-text: #d1fae5;
            --cat-fp-bg: #7f1d1d;
            --cat-fp-text: #fecaca;
            --cat-known-bg: #312e81;
            --cat-known-text: #c7d2fe;
            --error-bg: #450a0a;
            --error-border: #7f1d1d;
            --error-text: #fca5a5;
            --pill-type-bg: #1e1b4b;
            --pill-type-text: #a5b4fc;
            --toggle-bg: transparent;
            --toggle-border: #4b5563;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            transition: background 0.2s, color 0.2s;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        header {
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        .header-text { flex: 1; }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text);
        }

        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        header nav {
            margin-top: 0.5rem;
            font-size: 0.85rem;
        }

        header nav a {
            color: var(--accent);
            text-decoration: none;
            margin-right: 1rem;
        }

        header nav a:hover {
            text-decoration: underline;
        }

        .theme-toggle {
            background: var(--toggle-bg);
            border: 1px solid var(--toggle-border);
            border-radius: 6px;
            padding: 0.4rem 0.55rem;
            cursor: pointer;
            font-size: 1.1rem;
            line-height: 1;
            color: var(--text-muted);
            transition: border-color 0.15s;
            margin-top: 0.1rem;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
        }

        .input-section {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: background 0.2s, border-color 0.2s;
        }

        .input-section > label {
            display: block;
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            color: var(--input-label);
        }

        textarea {
            width: 100%;
            min-height: 140px;
            padding: 0.75rem;
            border: 1px solid var(--input-border);
            border-radius: 6px;
            font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
            font-size: 0.875rem;
            line-height: 1.6;
            resize: vertical;
            color: var(--text);
            background: var(--input-bg);
            transition: border-color 0.15s, background 0.2s, color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        textarea::placeholder {
            color: var(--text-faint);
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 0.75rem;
        }

        .controls label {
            margin: 0;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.35rem;
            cursor: pointer;
            color: var(--text-muted);
        }

        button#submit {
            padding: 0.6rem 1.5rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }

        button#submit:hover { background: var(--accent-hover); }
        button#submit:active { background: var(--accent-active); }
        button#submit:disabled { background: var(--btn-disabled); cursor: not-allowed; }

        .stats {
            margin-left: auto;
            font-size: 0.8rem;
            color: var(--text-faint);
        }

        /* Results */
        #results { display: none; }
        #results.visible { display: block; }

        .result-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 1rem 1.25rem;
            margin-bottom: 0.75rem;
            transition: background 0.2s, border-color 0.2s;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .result-value {
            font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
            font-size: 0.9rem;
            font-weight: 600;
            word-break: break-all;
        }

        .badge {
            display: inline-block;
            padding: 0.1rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .badge-hit {
            background: var(--badge-hit-bg);
            color: var(--badge-hit-text);
        }

        .badge-clean {
            background: var(--badge-clean-bg);
            color: var(--badge-clean-text);
        }

        .match-count {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-left: auto;
        }

        .matches-list {
            margin-top: 0.75rem;
            border-top: 1px solid var(--divider);
            padding-top: 0.5rem;
        }

        .match-item {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            padding: 0.35rem 0;
            font-size: 0.85rem;
        }

        .match-slug {
            font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
            font-size: 0.8rem;
            color: var(--accent);
            white-space: nowrap;
        }

        .match-name {
            color: var(--text-muted);
        }

        .match-category {
            font-size: 0.7rem;
            padding: 0.05rem 0.4rem;
            border-radius: 4px;
            white-space: nowrap;
        }

        .cat-fp {
            background: var(--cat-fp-bg);
            color: var(--cat-fp-text);
        }

        .cat-known {
            background: var(--cat-known-bg);
            color: var(--cat-known-text);
        }

        .pill-type {
            font-size: 0.7rem;
            padding: 0.05rem 0.4rem;
            border-radius: 4px;
            white-space: nowrap;
            background: var(--pill-type-bg);
            color: var(--pill-type-text);
        }

        .error-msg {
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            border-radius: 8px;
            padding: 1rem;
            color: var(--error-text);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-text">
                <h1>MISP Feedback</h1>
                <p>Check indicators against MISP warninglists</p>
                <nav>
                    <a href="/docs">API Docs</a>
                    <a href="/openapi.json">OpenAPI Spec</a>
                    <a href="/health">Health</a>
                </nav>
            </div>
            <button class="theme-toggle" id="theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode"></button>
        </header>

        <div class="input-section">
            <label for="values">Indicators (one per line)</label>
            <textarea id="values" placeholder="8.8.8.8&#10;google.com&#10;abuse@example.com&#10;10.0.0.0/8"></textarea>
            <div class="controls">
                <button id="submit" onclick="doLookup()">Look up</button>
                <label>
                    <input type="checkbox" id="fp-only">
                    False positives only
                </label>
                <span class="stats" id="stats"></span>
            </div>
        </div>

        <div id="results"></div>
    </div>

    <script>
        // Theme toggle
        const themeBtn = document.getElementById('theme-toggle');
        const root = document.documentElement;

        function setTheme(dark) {
            root.setAttribute('data-theme', dark ? 'dark' : 'light');
            themeBtn.textContent = dark ? '\u2600\uFE0F' : '\uD83C\uDF19';
            localStorage.setItem('theme', dark ? 'dark' : 'light');
        }

        // Init from stored preference or system preference
        const stored = localStorage.getItem('theme');
        if (stored) {
            setTheme(stored === 'dark');
        } else {
            setTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);
        }

        themeBtn.addEventListener('click', function() {
            setTheme(root.getAttribute('data-theme') !== 'dark');
        });

        // Lookup logic
        const textarea = document.getElementById('values');
        const btn = document.getElementById('submit');
        const fpOnly = document.getElementById('fp-only');
        const resultsDiv = document.getElementById('results');
        const statsSpan = document.getElementById('stats');

        textarea.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                doLookup();
            }
        });

        async function doLookup() {
            const raw = textarea.value.trim();
            if (!raw) return;

            const values = raw.split('\n').map(s => s.trim()).filter(s => s.length > 0);
            if (values.length === 0) return;
            if (values.length > 10000) {
                resultsDiv.innerHTML = '<div class="error-msg">Maximum 10,000 values per request.</div>';
                resultsDiv.classList.add('visible');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Looking up\u2026';
            statsSpan.textContent = '';
            resultsDiv.innerHTML = '';
            resultsDiv.classList.remove('visible');

            const t0 = performance.now();

            try {
                const resp = await fetch('/lookup/batch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        values: values,
                        false_positives_only: fpOnly.checked
                    })
                });

                if (!resp.ok) {
                    throw new Error('HTTP ' + resp.status + ': ' + (await resp.text()));
                }

                const data = await resp.json();
                const elapsed = ((performance.now() - t0) / 1000).toFixed(2);
                const hits = data.results.filter(r => r.matched).length;

                statsSpan.textContent = values.length + ' value' + (values.length !== 1 ? 's' : '') +
                    ', ' + hits + ' hit' + (hits !== 1 ? 's' : '') +
                    ', ' + elapsed + 's';

                renderResults(data.results);
            } catch (err) {
                resultsDiv.innerHTML = '<div class="error-msg">' + escapeHtml(err.message) + '</div>';
                resultsDiv.classList.add('visible');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Look up';
            }
        }

        function renderResults(results) {
            let html = '';
            for (const r of results) {
                html += '<div class="result-card">';
                html += '<div class="result-header">';
                html += '<span class="result-value">' + escapeHtml(r.value) + '</span>';
                html += r.matched
                    ? '<span class="badge badge-hit">Hit</span>'
                    : '<span class="badge badge-clean">Clean</span>';
                if (r.matches.length > 0) {
                    html += '<span class="match-count">' + r.matches.length + ' list' + (r.matches.length !== 1 ? 's' : '') + '</span>';
                }
                html += '</div>';

                if (r.matches.length > 0) {
                    html += '<div class="matches-list">';
                    for (const m of r.matches) {
                        const catClass = m.category === 'false-positive' ? 'cat-fp' : 'cat-known';
                        html += '<div class="match-item">';
                        html += '<span class="match-slug">' + escapeHtml(m.slug) + '</span>';
                        html += '<span class="match-category ' + catClass + '">' + escapeHtml(m.category) + '</span>';
                        html += '<span class="pill-type">' + escapeHtml(m.list_type) + '</span>';
                        html += '<span class="match-name">' + escapeHtml(m.name) + '</span>';
                        html += '</div>';
                    }
                    html += '</div>';
                }

                html += '</div>';
            }
            resultsDiv.innerHTML = html;
            resultsDiv.classList.add('visible');
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }
    </script>
</body>
</html>
