<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISP Feedback</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
            color: #1a1a2e;
            line-height: 1.5;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        header {
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1a1a2e;
        }

        header p {
            color: #6b7280;
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        header nav {
            margin-top: 0.5rem;
            font-size: 0.85rem;
        }

        header nav a {
            color: #4f6ef7;
            text-decoration: none;
            margin-right: 1rem;
        }

        header nav a:hover {
            text-decoration: underline;
        }

        .input-section {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .input-section label {
            display: block;
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            color: #374151;
        }

        textarea {
            width: 100%;
            min-height: 140px;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
            font-size: 0.875rem;
            line-height: 1.6;
            resize: vertical;
            color: #1a1a2e;
            background: #fafbfc;
            transition: border-color 0.15s;
        }

        textarea:focus {
            outline: none;
            border-color: #4f6ef7;
            box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.1);
        }

        textarea::placeholder {
            color: #9ca3af;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 0.75rem;
        }

        .controls label {
            margin: 0;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.35rem;
            cursor: pointer;
            color: #6b7280;
        }

        button {
            padding: 0.6rem 1.5rem;
            background: #4f6ef7;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }

        button:hover { background: #3b5de7; }
        button:active { background: #2f4fd6; }
        button:disabled { background: #a0aec0; cursor: not-allowed; }

        .stats {
            margin-left: auto;
            font-size: 0.8rem;
            color: #9ca3af;
        }

        /* Results */
        #results { display: none; }
        #results.visible { display: block; }

        .result-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 1rem 1.25rem;
            margin-bottom: 0.75rem;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .result-value {
            font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
            font-size: 0.9rem;
            font-weight: 600;
            word-break: break-all;
        }

        .badge {
            display: inline-block;
            padding: 0.1rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .badge-hit {
            background: #fef3c7;
            color: #92400e;
        }

        .badge-clean {
            background: #d1fae5;
            color: #065f46;
        }

        .match-count {
            font-size: 0.8rem;
            color: #6b7280;
            margin-left: auto;
        }

        .matches-list {
            margin-top: 0.75rem;
            border-top: 1px solid #f3f4f6;
            padding-top: 0.5rem;
        }

        .match-item {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            padding: 0.35rem 0;
            font-size: 0.85rem;
        }

        .match-slug {
            font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
            font-size: 0.8rem;
            color: #4f6ef7;
            white-space: nowrap;
        }

        .match-name {
            color: #6b7280;
        }

        .match-category {
            font-size: 0.7rem;
            padding: 0.05rem 0.4rem;
            border-radius: 4px;
            white-space: nowrap;
        }

        .cat-fp {
            background: #fee2e2;
            color: #991b1b;
        }

        .cat-known {
            background: #e0e7ff;
            color: #3730a3;
        }

        .error-msg {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 1rem;
            color: #991b1b;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>MISP Feedback</h1>
            <p>Check indicators against MISP warninglists</p>
            <nav>
                <a href="/docs">API Docs</a>
                <a href="/openapi.json">OpenAPI Spec</a>
                <a href="/health">Health</a>
            </nav>
        </header>

        <div class="input-section">
            <label for="values">Indicators (one per line)</label>
            <textarea id="values" placeholder="8.8.8.8&#10;google.com&#10;abuse@example.com&#10;10.0.0.0/8"></textarea>
            <div class="controls">
                <button id="submit" onclick="doLookup()">Look up</button>
                <label>
                    <input type="checkbox" id="fp-only">
                    False positives only
                </label>
                <span class="stats" id="stats"></span>
            </div>
        </div>

        <div id="results"></div>
    </div>

    <script>
        const textarea = document.getElementById('values');
        const btn = document.getElementById('submit');
        const fpOnly = document.getElementById('fp-only');
        const resultsDiv = document.getElementById('results');
        const statsSpan = document.getElementById('stats');

        textarea.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                doLookup();
            }
        });

        async function doLookup() {
            const raw = textarea.value.trim();
            if (!raw) return;

            const values = raw.split('\n').map(s => s.trim()).filter(s => s.length > 0);
            if (values.length === 0) return;
            if (values.length > 10000) {
                resultsDiv.innerHTML = '<div class="error-msg">Maximum 10,000 values per request.</div>';
                resultsDiv.classList.add('visible');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Looking up\u2026';
            statsSpan.textContent = '';
            resultsDiv.innerHTML = '';
            resultsDiv.classList.remove('visible');

            const t0 = performance.now();

            try {
                const resp = await fetch('/lookup/batch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        values: values,
                        false_positives_only: fpOnly.checked
                    })
                });

                if (!resp.ok) {
                    throw new Error('HTTP ' + resp.status + ': ' + (await resp.text()));
                }

                const data = await resp.json();
                const elapsed = ((performance.now() - t0) / 1000).toFixed(2);
                const hits = data.results.filter(r => r.matched).length;

                statsSpan.textContent = values.length + ' value' + (values.length !== 1 ? 's' : '') +
                    ', ' + hits + ' hit' + (hits !== 1 ? 's' : '') +
                    ', ' + elapsed + 's';

                renderResults(data.results);
            } catch (err) {
                resultsDiv.innerHTML = '<div class="error-msg">' + escapeHtml(err.message) + '</div>';
                resultsDiv.classList.add('visible');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Look up';
            }
        }

        function renderResults(results) {
            let html = '';
            for (const r of results) {
                html += '<div class="result-card">';
                html += '<div class="result-header">';
                html += '<span class="result-value">' + escapeHtml(r.value) + '</span>';
                html += r.matched
                    ? '<span class="badge badge-hit">Hit</span>'
                    : '<span class="badge badge-clean">Clean</span>';
                if (r.matches.length > 0) {
                    html += '<span class="match-count">' + r.matches.length + ' list' + (r.matches.length !== 1 ? 's' : '') + '</span>';
                }
                html += '</div>';

                if (r.matches.length > 0) {
                    html += '<div class="matches-list">';
                    for (const m of r.matches) {
                        const catClass = m.category === 'false-positive' ? 'cat-fp' : 'cat-known';
                        html += '<div class="match-item">';
                        html += '<span class="match-slug">' + escapeHtml(m.slug) + '</span>';
                        html += '<span class="match-category ' + catClass + '">' + escapeHtml(m.category) + '</span>';
                        html += '<span class="match-name">' + escapeHtml(m.name) + '</span>';
                        html += '</div>';
                    }
                    html += '</div>';
                }

                html += '</div>';
            }
            resultsDiv.innerHTML = html;
            resultsDiv.classList.add('visible');
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }
    </script>
</body>
</html>
